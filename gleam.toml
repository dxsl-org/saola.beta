name = "saola"
version = "1.0.0"
target = 'javascript'

description = "A Lustre UI component library — typed, stateless widgets built on Basecoat CSS."
licences = ["Apache-2.0"]
repository = { type = "github", user = "dxsl-org", repo = "saola" }
links = [{ title = "Changelog", href = "https://github.com/dxsl-org/saola/blob/main/CHANGELOG.md" }]

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_time = ">= 1.8.0 and < 2.0.0"
lustre = ">= 5.7.0 and < 6.0.0"
typeid_gleam = ">= 1.1.0 and < 2.0.0"
iv = ">= 1.4.2 and < 2.0.0"
on = ">= 3.0.4 and < 4.0.0"
plinth = ">= 0.10.2 and < 1.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.3.6 and < 3.0.0"
lucide_lustre = ">= 2.0.3 and < 3.0.0"
modem = ">= 2.1.2 and < 3.0.0"
formal = ">= 3.0.1 and < 4.0.0"

[tool.lustre.bin]
bun = "system"

[tools.lustre.html]
title = "Preview"
# Primary dev server is Vite (bun run vite / just vite-dev-preview); this config is only
# used by the secondary `lustre/dev start` preview server.
# lustre/dev serves priv/static/ at the root — /saola.css resolves if the server honours that path.
# If /saola.css 404s (lustre/dev doesn't mount priv/static), the Vite dev loop is unaffected.
stylesheets = [
  { href = "/saola.css" },
  { href = "/app.css" }
]
